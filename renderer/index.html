<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' https://i.ytimg.com data:">
  <title>VidSaver</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <h1>VidSaver</h1>
      </div>
      <div class="header-actions">
        <button id="feedbackBtn" class="icon-btn" title="Suggest a feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </button>
        <button id="bugBtn" class="icon-btn" title="Report a bug">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </button>
        <button id="themeBtn" class="icon-btn" title="Toggle theme">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <span class="version">v1.1</span>
      </div>
    </header>

    <div class="url-bar">
      <div class="url-input-wrap">
        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="urlInput" placeholder="Paste YouTube URL (playlist or single video)..." spellcheck="false">
      </div>
      <button id="fetchBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/>
        </svg>
        Fetch
      </button>
    </div>

    <div id="errorBar" class="error-bar hidden"></div>

    <div id="mainContent" class="content hidden">
      <div class="toolbar">
        <div class="toolbar-left">
          <label class="checkbox-all">
            <input type="checkbox" id="selectAll" checked>
            <span>Select All</span>
          </label>
          <span id="videoCount" class="count-badge">0 videos</span>
        </div>
        <div class="toolbar-right">
          <div class="format-group">
            <label class="format-label">Format</label>
            <select id="formatSelect" class="select">
              <option value="mp4">MP4 Video</option>
              <option value="mkv">MKV Video</option>
              <option value="mp3">MP3 Audio</option>
            </select>
          </div>
          <div class="format-group">
            <label class="format-label">Quality</label>
            <select id="qualitySelect" class="select"></select>
          </div>
        </div>
      </div>

      <div class="preset-row">
        <div class="format-group">
          <label class="format-label">Preset</label>
          <select id="presetSelect" class="select preset-select">
            <option value="">(none)</option>
          </select>
        </div>
        <button id="savePresetBtn" class="btn btn-sm btn-outline" title="Save current settings as preset">+ Save</button>
        <button id="deletePresetBtn" class="btn btn-sm btn-outline hidden" title="Delete this preset">×</button>
      </div>

      <div class="video-list" id="videoList"></div>

      <div class="footer-bar">
        <div class="footer-left">
          <div class="path-picker">
            <button id="pathBtn" class="btn btn-outline">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <span id="pathDisplay">Choose download folder...</span>
            </button>
          </div>
          <div class="size-info">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            <span id="totalSize">~0 MB</span>
          </div>
          <div class="size-info eta-info hidden" id="etaInfo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="etaText">ETA —</span>
          </div>
        </div>
        <div class="footer-right">
          <span id="statusText" class="status-text"></span>
          <button id="downloadBtn" class="btn btn-accent" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
          <button id="cancelBtn" class="btn btn-danger hidden">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Cancel
          </button>
        </div>
      </div>

      <div id="progressContainer" class="progress-container hidden">
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-details">
          <span id="progressLabel">Starting...</span>
          <span id="progressPercent">0%</span>
        </div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <h2>Ready to download</h2>
      <p>Paste a YouTube playlist or video URL above and click <strong>Fetch</strong></p>
    </div>
  </div>

  <div id="contextMenu" class="context-menu hidden">
    <div class="ctx-item" data-action="copy-title">Copy Title</div>
    <div class="ctx-item" data-action="open-browser">Open in Browser</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" data-action="retry">Retry</div>
  </div>

  <div id="presetDialog" class="dialog-overlay hidden">
    <div class="dialog">
      <div class="dialog-title">Save Preset</div>
      <input type="text" id="presetNameInput" class="dialog-input" placeholder="e.g. Phone, Archive, 4K..." spellcheck="false">
      <div class="dialog-actions">
        <button id="presetCancelBtn" class="btn btn-outline">Cancel</button>
        <button id="presetConfirmBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
